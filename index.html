<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGI - Municipalidad de Rufino</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; background: #f0f0f0; }

        /* Panel Izquierdo: Búsquedas y Ficha */
        .panel-izquierdo {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 15px; width: 260px;
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            max-height: 95vh; overflow-y: auto;
        }

        /* Panel Derecho: Estadísticas Generales */
        .panel-derecho {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; width: 280px; border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); transition: all 0.3s ease;
        }
        .header-panel { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 2px solid #3498db; }
        .btn-toggle { background: none; border: none; font-size: 18px; cursor: pointer; color: #3498db; }
        .cuerpo-panel { padding: 15px; }

        /* Panel Análisis de Calle */
        #panelEstadisticaCalle {
            display: none; background: #f8f9fa; margin-top: 15px;
            padding: 12px; border-radius: 10px; border-left: 5px solid #00fbff;
        }

        h2 { font-size: 12px; margin: 0; color: #2c3e50; text-transform: uppercase; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; margin-bottom: 5px; }

        #listaSugerencias, #listaSugerenciasCalle { 
            background: white; border: 1px solid #ddd; border-top: none; 
            max-height: 180px; overflow-y: auto; display: none; margin-bottom: 10px;
        }
        .item-sugerencia { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 11px; }
        .item-sugerencia:hover { background: #f8f9fa; color: #3498db; }

        .etiqueta-porcentaje { font-size: 10px; font-weight: bold; color: #7f8c8d; margin-top: 8px; display: block; }
        .barra-progreso { background: #ddd; border-radius: 4px; height: 8px; width: 100%; margin-top: 2px; overflow: hidden; }
        .progreso-llenado { height: 100%; transition: width 0.5s ease; }

        #contenidoFicha { display: none; margin-top: 15px; border-top: 2px solid #3498db; padding-top: 10px; position: relative; font-size: 11px; }
        .btn-cerrar-ficha { position: absolute; top: 5px; right: 0; background: #e74c3c; color: white; border: none; width: 22px; height: 22px; cursor: pointer; border-radius: 4px; }
        
        .lote-calle-resaltada { stroke: #00fbff !important; stroke-width: 6px !important; stroke-opacity: 1 !important; fill-opacity: 0.8 !important; z-index: 1000 !important; }
        @keyframes parpadear { 0% { fill-opacity: 0.2; } 50% { fill-opacity: 1; } 100% { fill-opacity: 0.2; } }
        .lote-parpadeando { animation: parpadear 0.5s ease-in-out 5 !important; stroke: white !important; stroke-width: 5px !important; z-index: 1500 !important; }
    </style>
</head>
<body>
    <div class="panel-izquierdo">
        <h2>Búsquedas</h2>
        <input type="text" id="inputApellido" placeholder="🔎 Apellido o Partida..." autocomplete="off">
        <div id="listaSugerencias"></div>
        
        <input type="text" id="inputCalle" placeholder="🛣️ Nombre de Calle..." autocomplete="off" style="margin-top: 10px;">
        <div id="listaSugerenciasCalle"></div>
        
        <div id="contenidoFicha"></div>

        <div id="panelEstadisticaCalle">
            <h2 style="font-size: 11px; color: #16a085;">ANÁLISIS DE CALLE</h2>
            <div id="statsCalleContenido"></div>
            <div style="height: 120px; margin-top: 10px;">
                <canvas id="graficoCalle"></canvas>
            </div>
        </div>
    </div>

    <div class="panel-derecho" id="panelD">
        <div class="header-panel">
            <h2>Estado General</h2>
            <button class="btn-toggle" onclick="togglePanelDerecho()" id="btnT">➖</button>
        </div>
        <div class="cuerpo-panel" id="cuerpoD">
            <canvas id="graficoBarras" height="180"></canvas>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
